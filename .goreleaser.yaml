version: 2

project_name: excli

builds:
  - id: excli
    main: .
    binary: excli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}

archives:
  - ids:
      - excli
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: '{{ .ProjectName }}_{{ .Tag }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}'
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

release:
  name_template: '{{ .Tag }}'
